apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: private-demo
  labels:
    app: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: custom-html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: custom-html
          configMap:
            name: nginx-custom-html
